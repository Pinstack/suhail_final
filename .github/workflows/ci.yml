name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  hygiene:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies (locked)
        run: uv sync --all-groups --frozen --python ${{ matrix.python-version }}
      - name: Check lockfile
        run: uv lock --check
      - name: Check installed packages
        run: uv pip check
      - name: Audit dependencies
        run: uv run --with pip-audit pip-audit --local
      - name: Static undefined-name check
        run: uv run --with ruff ruff check src scripts

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies (locked)
        run: uv sync --all-groups --frozen --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run pytest
